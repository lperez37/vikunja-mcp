# GitHub Actions workflow for publishing releases to npm
# 
# IMPORTANT: Before using this workflow, you need to:
# 1. Create an npm access token at https://www.npmjs.com/settings/<your-username>/tokens
# 2. Add the token as a repository secret named NPM_TOKEN:
#    - Go to your repository Settings > Secrets and variables > Actions
#    - Click "New repository secret"
#    - Name: NPM_TOKEN
#    - Value: <your-npm-token>

name: Release

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build TypeScript
        run: npm run build
      
      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
